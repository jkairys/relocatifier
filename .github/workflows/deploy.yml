name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      # Root deps pin wrangler 4.x; wrangler-action uses the local install
      # instead of falling back to its own (wrangler 3, which can't read
      # the Workers Assets config in wrangler.jsonc).
      - name: Install deploy dependencies
        run: npm ci

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build app
        working-directory: app
        run: npm run build

      # Deploys app/dist + the /data/* worker from wrangler.jsonc. Account id
      # lives in wrangler.jsonc; only the API token is a secret. Data artifacts
      # are published separately from the local machine (see Taskfile data:publish).
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
